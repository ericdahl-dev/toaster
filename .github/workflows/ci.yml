name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend test suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: toaster_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d toaster_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      RAILS_MAX_THREADS: 5
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/toaster_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.7
          bundler-cache: true

      - name: Install pgvector
        run: |
          cd /tmp
          git clone --depth 1 https://github.com/pgvector/pgvector.git
          cd pgvector
          make
          sudo make install

      - name: Prepare database
        run: bundle exec rails db:prepare

      - name: Build Tailwind CSS
        run: bundle exec rails tailwindcss:build

      - name: Run backend specs
        run: bundle exec rspec
