# Backend: Puma + GoodJob worker (same image, two processes).
# Coolify: set "Docker Compose Location" to this file and base directory to `backend/`
# (or repo root with `context`/`dockerfile` paths adjusted). Required env at runtime:
#   DATABASE_URL, RAILS_MASTER_KEY (must match the key for config/credentials.yml.enc in the image)
#
# Local: from `backend/` run `docker compose up --build`

services:
  web:
    build: .
    command: [ "./bin/rails", "server", "-b", "0.0.0.0" ]
    expose:
      - "3000"
    environment:
      - DATABASE_URL
      - RAILS_MASTER_KEY
      - RAILS_ENV=production
      - TOASTER_SEED_ACCOUNT_NAME=${TOASTER_SEED_ACCOUNT_NAME}
      - TOASTER_ADMIN_EMAIL=${TOASTER_ADMIN_EMAIL}
      - TOASTER_ADMIN_PASSWORD=${TOASTER_ADMIN_PASSWORD}
      - TOASTER_ADMIN_NAME=${TOASTER_ADMIN_NAME}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:3000/up" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  worker:
    build: .
    command: [ "bundle", "exec", "good_job", "start" ]
    environment:
      - DATABASE_URL
      - RAILS_MASTER_KEY
      - RAILS_ENV=production
    restart: unless-stopped
