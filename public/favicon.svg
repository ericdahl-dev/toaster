<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Amber rounded square background (matches .toast-icon bg) -->
  <rect width="64" height="64" rx="12" ry="12" fill="#f59e0b"/>
  <!-- Toast slice: crust body -->
  <rect x="14" y="20" width="36" height="30" rx="4" ry="4" fill="#92610a"/>
  <!-- Toast dome top -->
  <path d="M14 28 Q14 14 32 14 Q50 14 50 28 Z" fill="#92610a"/>
  <!-- Toasted face (lighter center) -->
  <rect x="19" y="28" width="26" height="18" rx="2.5" ry="2.5" fill="#c8860a"/>
  <!-- Grill lines -->
  <rect x="22" y="31" width="20" height="2" rx="1" fill="#92610a" opacity="0.7"/>
  <rect x="22" y="36" width="20" height="2" rx="1" fill="#92610a" opacity="0.7"/>
  <rect x="22" y="41" width="20" height="2" rx="1" fill="#92610a" opacity="0.7"/>
  <!-- Highlight -->
  <rect x="20" y="29" width="7" height="13" rx="2" fill="#f5c84a" opacity="0.2"/>
</svg>
